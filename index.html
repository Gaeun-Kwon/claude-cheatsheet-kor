<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 치트시트 (한국어)</title>
<meta name="description" content="Claude Code 단축키, 슬래시 명령어, CLI, MCP, 환경변수 한국어 레퍼런스">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','Noto Sans KR',system-ui,sans-serif;background:#fdf6ec;color:#222;font-size:11px;line-height:1.45}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:2px solid #ddd}
.hdr-title{font-size:18px;font-weight:800;color:#222;letter-spacing:-.5px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-ver{font-size:11px;color:#666}
.hdr-ver b{color:#c0392b}
.os-tog{display:flex;gap:0;border:1px solid #ccc;border-radius:4px;overflow:hidden}
.os-tog button{border:none;background:#f5f5f5;padding:3px 10px;cursor:pointer;font-size:11px;color:#666}
.os-tog button.on{background:#333;color:#fff}
.search-wrap{position:relative}
.search-wrap input{border:1px solid #ccc;padding:3px 8px 3px 22px;border-radius:4px;font-size:11px;width:160px;outline:none;background:#fff}
.search-wrap input:focus{border-color:#c0392b}
.search-wrap::before{content:'🔍';position:absolute;left:5px;top:50%;transform:translateY(-50%);font-size:10px}

/* Recent Changes Banner */
.banner{background:#fef9c3;border:1px solid #eab308;padding:6px 16px;font-size:10px;line-height:1.6}
.banner b{color:#92400e;margin-right:4px}
.banner .items{display:flex;flex-wrap:wrap;gap:4px 16px}
.banner .item::before{content:'• ';color:#92400e}
.banner .close{float:right;cursor:pointer;color:#92400e;font-size:14px;line-height:1;margin-left:8px}

/* Grid */
.grid{display:flex;gap:0;padding:6px 8px 20px;align-items:flex-start}
.col{flex:1;min-width:0;padding:0 4px}

/* Section card */
.sec{margin-bottom:8px}
.sec-hdr{padding:4px 8px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;border-radius:4px 4px 0 0}
.sec-body{background:#fff;border:1px solid #ddd;border-top:none;border-radius:0 0 4px 4px;padding:2px 0}

/* Group */
.grp-name{font-size:10px;font-weight:700;color:#555;padding:4px 8px 2px;text-transform:uppercase;letter-spacing:.3px;border-top:1px solid #eee}
.grp-name:first-child,.sec-body .grp-name:first-of-type{border-top:none}

/* Row */
.row{display:flex;align-items:baseline;padding:1px 8px;gap:6px;line-height:1.5}
.row:hover{background:#fef3c7}

/* Keyboard shortcut display */
.k{display:inline-flex;gap:2px;flex-shrink:0}
.k kbd{display:inline-block;background:#f3f3f3;border:1px solid #ccc;border-radius:3px;padding:0 4px;font-family:inherit;font-size:10px;color:#333;line-height:1.6;min-width:18px;text-align:center;white-space:nowrap;box-shadow:0 1px 0 #aaa}
.k .sep{color:#999;font-size:9px;padding:0 1px}

/* Command display */
.cmd{font-weight:600;color:#1a5276;white-space:nowrap;flex-shrink:0}
.slash .cmd{color:#196f3d}
.desc{color:#555;flex:1;min-width:0}

/* NEW badge */
.new{display:inline-block;background:#dc2626;color:#fff;font-size:8px;font-weight:700;padding:0 4px;border-radius:2px;margin-left:4px;vertical-align:middle;letter-spacing:.3px;line-height:1.5}

/* Print */
@media print{
  @page{size:A4 landscape;margin:6mm}
  body{background:#fff;font-size:9px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hdr{padding:6px 10px}
  .hdr-title{font-size:14px}
  .search-wrap,.os-tog button:not(.on){display:none !important}
  .banner{font-size:8px;padding:3px 10px}
  .grid{padding:4px 4px 0}
  .sec{margin-bottom:4px}
  .sec-hdr{padding:2px 6px;font-size:9px}
  .row{padding:0 6px;font-size:8px}
  .k kbd{font-size:8px;padding:0 2px;min-width:14px}
  .grp-name{font-size:8px;padding:2px 6px 1px}
  .new{font-size:6px;padding:0 2px}
  .cmd{font-size:8px}
  .desc{font-size:8px}
  .footer{display:none}
}

/* Mobile */
@media(max-width:900px){
  .grid{flex-direction:column}
  .col{width:100%}
  .hdr{flex-wrap:wrap;gap:6px}
}
@media(max-width:500px){
  .grid{padding:4px}
  .row{flex-wrap:wrap}
}

.footer{text-align:center;padding:12px;color:#888;font-size:10px;border-top:1px solid #ddd;background:#fff}
.footer a{color:#c0392b;text-decoration:none}
.hidden{display:none !important}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">Claude Code Cheat Sheet</div>
  <div class="hdr-right">
    <div class="search-wrap"><input id="search" placeholder="검색 (Ctrl+K)"></div>
    <div class="os-tog" id="osTog">
      <button data-os="mac">🍎</button>
      <button data-os="win">🪟</button>
    </div>
    <span class="hdr-ver">Claude Code <b id="ver"></b> &nbsp; Last updated: <span id="updated"></span></span>
  </div>
</div>

<div class="banner" id="banner">
  <span class="close" id="bannerClose">×</span>
  <b>📋 Recent Changes</b>
  <div class="items" id="bannerItems"></div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
  Claude Code 한국어 치트시트 — <a href="https://code.claude.com/docs/en/changelog" target="_blank">Changelog</a> ·
  <a href="https://code.claude.com/docs" target="_blank">공식 문서</a> ·
  Ctrl+P 인쇄 (A4 가로)
</div>

<script>
(function(){
  const isMac = /Mac|iPhone|iPad/.test(navigator.userAgent);
  let os = isMac ? 'mac' : 'win';
  let data = null;
  let search = '';

  async function init(){
    try { data = await(await fetch('data.json')).json(); } catch(e){
      document.getElementById('grid').innerHTML='<p style="padding:40px;text-align:center;color:#999">data.json 로드 실패</p>';
      return;
    }
    document.getElementById('ver').textContent = 'v' + data.meta.version;
    document.getElementById('updated').textContent = data.meta.lastUpdated;

    // Banner
    const bi = document.getElementById('bannerItems');
    bi.innerHTML = (data.meta.recentChanges||[]).map(c=>`<span class="item">${esc(c)}</span>`).join('');
    document.getElementById('bannerClose').onclick = ()=> document.getElementById('banner').style.display='none';

    // OS toggle
    const btns = document.querySelectorAll('#osTog button');
    btns.forEach(b=>{
      b.classList.toggle('on', b.dataset.os===os);
      b.onclick=()=>{os=b.dataset.os;btns.forEach(x=>x.classList.toggle('on',x.dataset.os===os));render();}
    });

    // Search
    const si = document.getElementById('search');
    si.addEventListener('input',e=>{search=e.target.value.toLowerCase();render();});
    document.addEventListener('keydown',e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();si.focus();si.select();}
      if(e.key==='Escape'&&document.activeElement===si){si.value='';search='';si.blur();render();}
    });

    render();
  }

  function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

  function renderKeys(item){
    let raw = item.keys || (os==='mac' ? item.keys_mac : item.keys_win) || '';
    if(!raw) return '';
    // Split by | for combo sequences, space for individual keys
    const parts = raw.split('|').map(p=>p.trim());
    let html = '<span class="k">';
    parts.forEach((part,i)=>{
      if(i>0) html += '<span class="sep"></span>';
      part.split(/\s+/).forEach(k=>{
        html += `<kbd>${esc(k)}</kbd>`;
      });
    });
    html += '</span>';
    return html;
  }

  function matches(item){
    if(!search) return true;
    const t = [item.cmd,item.desc,item.keys,item.keys_mac,item.keys_win].filter(Boolean).join(' ').toLowerCase();
    return t.includes(search);
  }

  function render(){
    const grid = document.getElementById('grid');
    let html = '';

    for(const col of data.columns){
      html += '<div class="col">';
      for(const sec of col.sections){
        let secHtml = '';
        let hasContent = false;

        for(const grp of sec.groups){
          const filtered = grp.items.filter(matches);
          if(!filtered.length) continue;
          hasContent = true;
          secHtml += `<div class="grp-name">${esc(grp.name)}</div>`;

          for(const item of filtered){
            const badge = item.isNew ? '<span class="new">NEW</span>' : '';
            const keys = renderKeys(item);
            const isSlash = sec.id === 'slash-commands';

            if(keys && item.cmd){
              // Has both keys and cmd (workflow items)
              secHtml += `<div class="row">${keys} <span class="cmd">${esc(item.cmd)}</span> <span class="desc">${esc(item.desc)}${badge}</span></div>`;
            } else if(keys){
              secHtml += `<div class="row">${keys} <span class="desc">${esc(item.desc)}${badge}</span></div>`;
            } else {
              secHtml += `<div class="row ${isSlash?'slash':''}"><span class="cmd">${esc(item.cmd)}</span> <span class="desc">${esc(item.desc)}${badge}</span></div>`;
            }
          }
        }

        if(hasContent){
          html += `<div class="sec"><div class="sec-hdr" style="background:${sec.color}">${sec.title}</div><div class="sec-body">${secHtml}</div></div>`;
        }
      }
      html += '</div>';
    }

    grid.innerHTML = html;
  }

  document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
})();
</script>
</body>
</html>
