<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 치트시트 (한국어)</title>
<meta name="description" content="Claude Code 단축키, 슬래시 명령어, CLI 플래그, MCP 설정, 환경 변수 등 전체 한국어 레퍼런스">
<style>
:root {
  --bg: #0f1117;
  --card-bg: #1a1d27;
  --card-border: #2a2d3a;
  --text: #e4e4e7;
  --text-dim: #9ca3af;
  --accent: #f97316;
  --accent-dim: #c2410c;
  --kbd-bg: #2a2d3a;
  --kbd-border: #3a3d4a;
  --new-badge: #22c55e;
  --cat-session: #3b82f6;
  --cat-model: #f59e0b;
  --cat-settings: #8b5cf6;
  --cat-tools: #10b981;
  --cat-util: #6366f1;
  --cat-etc: #9ca3af;
  --section-title: #f97316;
  --search-bg: #1a1d27;
  --search-border: #3a3d4a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 13px;
}

.header {
  background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
  border-bottom: 1px solid var(--card-border);
  padding: 16px 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-inner {
  max-width: 1600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
}

.logo span { color: var(--text); font-weight: 400; }

.version-badge {
  background: var(--accent-dim);
  color: white;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}

.last-updated {
  color: var(--text-dim);
  font-size: 11px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-box {
  position: relative;
}

.search-box input {
  background: var(--search-bg);
  border: 1px solid var(--search-border);
  color: var(--text);
  padding: 6px 12px 6px 32px;
  border-radius: 6px;
  font-size: 13px;
  width: 220px;
  outline: none;
  transition: border-color 0.2s;
}

.search-box input:focus {
  border-color: var(--accent);
}

.search-box::before {
  content: '🔍';
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
}

.os-toggle {
  display: flex;
  background: var(--kbd-bg);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--card-border);
}

.os-toggle button {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 5px 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  transition: all 0.2s;
}

.os-toggle button.active {
  background: var(--accent);
  color: white;
}

.print-btn {
  background: var(--kbd-bg);
  border: 1px solid var(--card-border);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}

.print-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}

/* Nav */
.nav {
  background: var(--card-bg);
  border-bottom: 1px solid var(--card-border);
  padding: 0 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.nav-inner {
  max-width: 1600px;
  margin: 0 auto;
  display: flex;
  gap: 0;
}

.nav a {
  color: var(--text-dim);
  text-decoration: none;
  padding: 8px 14px;
  font-size: 12px;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}

.nav a:hover, .nav a.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* Main grid */
.main {
  max-width: 1600px;
  margin: 0 auto;
  padding: 16px 24px 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.card:hover {
  border-color: var(--accent-dim);
}

.card-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--card-border);
  background: rgba(249, 115, 22, 0.03);
}

.card-header .icon { font-size: 16px; }

.card-header h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--section-title);
}

.card-header .count {
  margin-left: auto;
  color: var(--text-dim);
  font-size: 11px;
}

.card-body {
  padding: 4px 0;
}

/* Shortcut row */
.row {
  display: flex;
  align-items: center;
  padding: 6px 16px;
  gap: 10px;
  border-bottom: 1px solid rgba(42, 45, 58, 0.5);
  transition: background 0.15s;
}

.row:last-child { border-bottom: none; }
.row:hover { background: rgba(249, 115, 22, 0.04); }

.row-label {
  flex: 1;
  min-width: 0;
}

.row-label .name {
  font-weight: 600;
  font-size: 12.5px;
  color: var(--text);
}

.row-label .desc {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 1px;
}

kbd {
  display: inline-block;
  background: var(--kbd-bg);
  border: 1px solid var(--kbd-border);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  color: var(--text);
  white-space: nowrap;
  line-height: 1.6;
}

.shortcut-keys {
  flex-shrink: 0;
  text-align: right;
}

.new-badge {
  display: inline-block;
  background: var(--new-badge);
  color: white;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 6px;
  vertical-align: middle;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Category badges for slash commands */
.cat-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
  margin-right: 6px;
}

.cat-세션 { background: rgba(59,130,246,0.15); color: var(--cat-session); }
.cat-모델 { background: rgba(245,158,11,0.15); color: var(--cat-model); }
.cat-설정 { background: rgba(139,92,246,0.15); color: var(--cat-settings); }
.cat-도구 { background: rgba(16,185,129,0.15); color: var(--cat-tools); }
.cat-유틸 { background: rgba(99,102,241,0.15); color: var(--cat-util); }
.cat-기타 { background: rgba(156,163,175,0.15); color: var(--cat-etc); }

/* Slash command row: label is a code-like element */
.slash-label {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
}

/* CLI row */
.cli-label {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11.5px;
  color: #93c5fd;
}

/* ENV row */
.env-label {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  color: #c4b5fd;
}

/* Memory / config row */
.path-label {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px;
  color: #86efac;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  color: var(--text-dim);
  font-size: 11px;
  border-top: 1px solid var(--card-border);
}

.footer a {
  color: var(--accent);
  text-decoration: none;
}

/* hidden class for search */
.hidden { display: none !important; }

/* No results */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
  font-size: 16px;
}

/* Print styles */
@media print {
  @page {
    size: A4 landscape;
    margin: 8mm;
  }

  body {
    background: white;
    color: #111;
    font-size: 9px;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .header { position: static; background: white; padding: 8px 12px; border-bottom: 2px solid #333; }
  .header-right .search-box, .header-right .print-btn { display: none; }
  .nav { display: none; }
  .main { padding: 8px 12px; }

  .grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .card {
    border: 1px solid #ccc;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .card-header {
    padding: 4px 8px;
    background: #f5f5f5 !important;
  }

  .card-header h2 { font-size: 10px; color: #333; }

  .row { padding: 3px 8px; }
  .row-label .name { font-size: 9px; color: #111; }
  .row-label .desc { font-size: 8px; color: #666; }
  kbd { font-size: 8px; padding: 0 3px; background: #eee; border: 1px solid #ccc; color: #111; }
  .new-badge { font-size: 7px; background: #22c55e !important; }
  .os-toggle button { font-size: 9px; padding: 2px 6px; }
  .os-toggle button.active { background: #f97316 !important; color: white !important; }
  .version-badge { background: #c2410c !important; }
  .footer { padding: 8px; font-size: 8px; }
  .logo { font-size: 14px; }
}

/* Mobile */
@media (max-width: 768px) {
  .header-inner { flex-direction: column; align-items: flex-start; }
  .header-right { width: 100%; flex-wrap: wrap; }
  .search-box input { width: 100%; }
  .grid { grid-template-columns: 1fr; }
  .nav-inner { gap: 0; }
  .main { padding: 12px; }
}

@media (max-width: 500px) {
  .grid { grid-template-columns: 1fr; }
  .row { flex-direction: column; align-items: flex-start; gap: 4px; }
  .shortcut-keys { align-self: flex-end; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo">Claude Code <span>치트시트</span></div>
      <span class="version-badge" id="versionBadge">v—</span>
      <span class="last-updated" id="lastUpdated"></span>
    </div>
    <div class="header-right">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="검색 (Ctrl+K)" autocomplete="off">
      </div>
      <div class="os-toggle" id="osToggle">
        <button data-os="mac">Mac</button>
        <button data-os="win">Windows</button>
      </div>
      <button class="print-btn" onclick="window.print()" title="Ctrl+P로 인쇄">🖨 인쇄</button>
    </div>
  </div>
</header>

<nav class="nav" id="nav">
  <div class="nav-inner" id="navInner"></div>
</nav>

<main class="main">
  <div class="grid" id="grid"></div>
</main>

<footer class="footer">
  <p>Claude Code 한국어 치트시트 — 공식 문서 기반 자동 업데이트 |
    <a href="https://code.claude.com/docs/en/changelog" target="_blank" rel="noopener">Changelog</a> |
    <a href="https://code.claude.com/docs/en/interactive-mode" target="_blank" rel="noopener">공식 문서</a> |
    Ctrl+P로 A4 가로 인쇄 가능
  </p>
</footer>

<script>
(function() {
  // OS detection
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0 || navigator.userAgent.indexOf('Mac') >= 0;
  let currentOS = isMac ? 'mac' : 'win';

  // State
  let data = null;
  let searchTerm = '';

  // Init
  async function init() {
    try {
      const res = await fetch('data.json');
      data = await res.json();
    } catch (e) {
      document.getElementById('grid').innerHTML = '<div class="no-results">data.json을 불러올 수 없습니다. 같은 디렉토리에 data.json이 있는지 확인해주세요.</div>';
      return;
    }

    document.getElementById('versionBadge').textContent = 'v' + data.meta.version;
    document.getElementById('lastUpdated').textContent = '업데이트: ' + data.meta.lastUpdated;

    setupOSToggle();
    setupSearch();
    buildNav();
    render();
  }

  function setupOSToggle() {
    const btns = document.querySelectorAll('#osToggle button');
    btns.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.os === currentOS);
      btn.addEventListener('click', () => {
        currentOS = btn.dataset.os;
        btns.forEach(b => b.classList.toggle('active', b.dataset.os === currentOS));
        render();
      });
    });
  }

  function setupSearch() {
    const input = document.getElementById('searchInput');
    input.addEventListener('input', (e) => {
      searchTerm = e.target.value.toLowerCase().trim();
      render();
    });
    // Ctrl+K to focus search
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        input.focus();
        input.select();
      }
      if (e.key === 'Escape' && document.activeElement === input) {
        input.value = '';
        searchTerm = '';
        input.blur();
        render();
      }
    });
  }

  function buildNav() {
    const nav = document.getElementById('navInner');
    nav.innerHTML = data.sections.map(s =>
      `<a href="#${s.id}" data-section="${s.id}">${s.icon} ${s.title}</a>`
    ).join('');

    nav.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') {
        document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
        e.target.classList.add('active');
      }
    });
  }

  function isNewItem(item) {
    if (!item.isNew) return false;
    if (!item.addedVersion) return item.isNew;
    // Check if within NEW badge days
    const updated = new Date(data.meta.lastUpdated);
    const now = new Date();
    const diffDays = (now - updated) / (1000 * 60 * 60 * 24);
    return diffDays < (data.meta.newBadgeDays || 14) || item.isNew;
  }

  function matchesSearch(item) {
    if (!searchTerm) return true;
    const fields = [
      item.label, item.description, item.mac, item.win, item.category, item.addedVersion
    ].filter(Boolean).join(' ').toLowerCase();
    return fields.includes(searchTerm);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderKbd(text) {
    if (!text || text === '—') return '<span style="color:var(--text-dim)">—</span>';
    return text.split(' / ').map(k => `<kbd>${escapeHtml(k)}</kbd>`).join(' ');
  }

  function render() {
    const grid = document.getElementById('grid');
    let html = '';
    let anyVisible = false;

    for (const section of data.sections) {
      const filteredItems = section.items.filter(matchesSearch);
      if (filteredItems.length === 0) continue;
      anyVisible = true;

      html += `<div class="card" id="${section.id}">`;
      html += `<div class="card-header">
        <span class="icon">${section.icon}</span>
        <h2>${section.title}</h2>
        <span class="count">${filteredItems.length}개</span>
      </div>`;
      html += `<div class="card-body">`;

      for (const item of filteredItems) {
        const badge = isNewItem(item) ? `<span class="new-badge">NEW</span>` : '';

        if (section.id === 'keyboard-shortcuts' || section.id === 'text-editing' || section.id === 'multiline') {
          // Shortcut-style row
          const key = currentOS === 'mac' ? item.mac : item.win;
          html += `<div class="row">
            <div class="row-label">
              <div class="name">${escapeHtml(item.label)}${badge}</div>
              <div class="desc">${escapeHtml(item.description)}</div>
            </div>
            <div class="shortcut-keys">${renderKbd(key)}</div>
          </div>`;
        } else if (section.id === 'slash-commands' || section.id === 'bundled-skills') {
          // Slash command row
          const cat = item.category ? `<span class="cat-badge cat-${item.category}">${item.category}</span>` : '';
          html += `<div class="row">
            <div class="row-label">
              <div class="name"><span class="slash-label">${escapeHtml(item.label)}</span>${badge}</div>
              <div class="desc">${cat}${escapeHtml(item.description)}</div>
            </div>
          </div>`;
        } else if (section.id === 'cli-commands' || section.id === 'cli-flags') {
          html += `<div class="row">
            <div class="row-label">
              <div class="name"><span class="cli-label">${escapeHtml(item.label)}</span>${badge}</div>
              <div class="desc">${escapeHtml(item.description)}</div>
            </div>
          </div>`;
        } else if (section.id === 'env-vars') {
          html += `<div class="row">
            <div class="row-label">
              <div class="name"><span class="env-label">${escapeHtml(item.label)}</span>${badge}</div>
              <div class="desc">${escapeHtml(item.description)}</div>
            </div>
          </div>`;
        } else if (section.id === 'memory' || section.id === 'settings-config' || section.id === 'mcp-config') {
          html += `<div class="row">
            <div class="row-label">
              <div class="name"><span class="path-label">${escapeHtml(item.label)}</span>${badge}</div>
              <div class="desc">${escapeHtml(item.description)}</div>
            </div>
          </div>`;
        } else {
          // Generic row
          html += `<div class="row">
            <div class="row-label">
              <div class="name">${escapeHtml(item.label)}${badge}</div>
              <div class="desc">${escapeHtml(item.description)}</div>
            </div>
          </div>`;
        }
      }

      html += `</div></div>`;
    }

    if (!anyVisible) {
      html = `<div class="no-results">\"${escapeHtml(searchTerm)}\"에 대한 결과가 없습니다.</div>`;
    }

    grid.innerHTML = html;
  }

  // Init on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
